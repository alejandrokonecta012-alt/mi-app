<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>App limpia</title>
</head>
<body>

<h1>App limpia funcionando</h1>
<button onclick="guardarChat()">Probar</button>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://mnwwjnmztxmwetsosugp.supabase.co",
  "sb_publishable_ZBnRvC877fnk_ZhmTmj_Og_dSweqDyo"
);

async function guardarChat() {
  const { data, error } = await supabase
    .from("chat_messages")
    .insert([
      { mensaje: "hola", respuesta: "limpio" }
    ])
    .select();

  console.log("DATA:", data);
  console.log("ERROR:", error);
}

window.guardarChat = guardarChat;
</script>

</body>
</html>
